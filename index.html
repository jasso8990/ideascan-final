<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDEA Scan</title>
<style>
  body { margin:0; background:#060e2d; display:flex; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; color:#fff; }
  .dot { width:8px;height:8px;border-radius:50%;background:#00c2ff;display:inline-block;animation:pulse 1s ease infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
</style>
</head>
<body>
<script>
  // Redirigir al login (o dashboard si hay sesión activa)
  const raw = localStorage.getItem('ideascan_session') || sessionStorage.getItem('ideascan_session');
  try {
    const s = raw ? JSON.parse(raw) : null;
    if (s?.access_token && s?.expires_at > Date.now()) {
      window.location.replace('ideascan-dashboard.html');
    } else {
      window.location.replace('ideascan-login.html');
    }
  } catch(e) {
    window.location.replace('ideascan-login.html');
  }
</script>
<span class="dot"></span>&nbsp; Cargando IDEA Scan...
</body>
</html>
